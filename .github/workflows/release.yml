name: Build Windows Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        shell: powershell
        run: |
          choco install ffmpeg innosetup -y --no-progress
          python -m pip install --upgrade pip

      - name: Run tests
        shell: powershell
        run: |
          python -m pip install -r requirements.txt
          python -m unittest discover -s tests -v

      - name: Build application, ZIP, and installer
        shell: powershell
        run: .\build_release.ps1

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Twitch-Stream-Bot-Windows
          path: |
            dist_public/Twitch Stream Bot/Twitch Stream Bot *.zip
            dist_public/Twitch Stream Bot Setup *.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist_public/Twitch Stream Bot/Twitch Stream Bot *.zip
            dist_public/Twitch Stream Bot Setup *.exe
